<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>ONLYOFFICE Direct</title>
    <style>
        html,
        body,
        #editor {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #status {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font: 13px monospace;
            color: #fff;
            background: #191919;
        }
    </style>
</head>
<body>
    <div id="status">Loading ONLYOFFICE...</div>
    <div id="editor"></div>

    <script>
    (function() {
        'use strict';

        var params = new URLSearchParams(window.location.search || '');
        var sessionId = params.get('session') || '';
        var apiBase = params.get('api') || '/direct/api';
        var statusEl = document.getElementById('status');
        var editor = null;

        function post(message) {
            try {
                window.parent.postMessage(Object.assign({
                    type: 'kinDirectOnlyOfficeEvent',
                    sessionId: sessionId
                }, message || {}), '*');
            } catch (_error) {
                // ignore
            }
        }

        function fail(message) {
            if (statusEl) statusEl.textContent = message;
            post({ event: 'error', error: message });
        }

        function forwardKeydown(event) {
            post({
                event: 'editorKeydown',
                key: event && event.key ? String(event.key) : '',
                ctrlKey: !!(event && event.ctrlKey),
                metaKey: !!(event && event.metaKey),
                shiftKey: !!(event && event.shiftKey),
                altKey: !!(event && event.altKey)
            });
        }

        function resolveScriptUrl(src) {
            var value = String(src || '').trim();
            if (!value) return value;
            if (value.indexOf('http://') === 0 || value.indexOf('https://') === 0) return value;
            if (value.charAt(0) === '/') return (window.location.origin || '') + value;
            return value;
        }

        function loadScript(src) {
            return new Promise(function(resolve, reject) {
                var script = document.createElement('script');
                script.src = resolveScriptUrl(src);
                script.onload = resolve;
                script.onerror = function() {
                    reject(new Error('Could not load ONLYOFFICE API: ' + resolveScriptUrl(src)));
                };
                document.head.appendChild(script);
            });
        }

        async function start() {
            if (!sessionId) {
                fail('Missing direct session id.');
                return;
            }

            var response = await fetch(apiBase + '/session/' + encodeURIComponent(sessionId) + '/config', {
                method: 'GET',
                cache: 'no-store',
                headers: { Accept: 'application/json' }
            });
            var payload = await response.json().catch(function() { return null; });
            if (!response.ok || !payload || payload.response !== 'success') {
                fail((payload && payload.message) ? payload.message : 'Could not load editor config.');
                return;
            }

            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(function(reg) { return reg.unregister(); }));
                } catch (_swError) {
                    // ignore
                }
            }

            await loadScript(payload.api_url);
            if (!window.DocsAPI || !window.DocsAPI.DocEditor) {
                fail('ONLYOFFICE API did not initialize.');
                return;
            }

            var config = payload.config || {};
            config.events = Object.assign({}, config.events || {}, {
                onAppReady: function() {
                    if (statusEl) statusEl.style.display = 'none';
                    post({ event: 'ready' });
                },
                onDocumentStateChange: function(event) {
                    post({
                        event: 'documentStateChange',
                        changed: !!(event && event.data)
                    });
                },
                onRequestSaveAs: function(event) {
                    post({
                        event: 'requestSaveAs',
                        saveData: event && event.data ? event.data : {}
                    });
                },
                onError: function(event) {
                    post({
                        event: 'error',
                        error: event && event.data ? String(event.data) : 'ONLYOFFICE editor error'
                    });
                }
            });

            editor = new window.DocsAPI.DocEditor('editor', config);
            document.addEventListener('keydown', forwardKeydown, true);
            window.addEventListener('message', function(event) {
                var data = event && event.data ? event.data : null;
                if (!data || data.type !== 'kinEditorKeydown') return;
                post({
                    event: 'editorKeydown',
                    key: data.key || '',
                    ctrlKey: !!data.ctrlKey,
                    metaKey: !!data.metaKey,
                    shiftKey: !!data.shiftKey,
                    altKey: !!data.altKey
                });
            });
            window.addEventListener('beforeunload', function() {
                if (editor && typeof editor.destroyEditor === 'function') {
                    try { editor.destroyEditor(); } catch (_error) {}
                }
            });
        }

        start().catch(function(error) {
            fail(error && error.message ? error.message : String(error));
        });
    }());
    </script>
</body>
</html>
