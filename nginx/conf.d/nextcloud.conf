server {
    listen 80;
    server_name _;
    return 301 https://$host:5002$request_uri;
}

server {
    listen 443 ssl;
    listen 5002 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    client_max_body_size 10G;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Serve kin-bridge.js directly
    location = /kin-bridge.js {
        alias /etc/nginx/kin-bridge.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # Serve kin-bridge-admin.js directly (for kinnextcloud app)
    location = /kin-bridge-admin.js {
        alias /etc/nginx/kin-bridge-admin.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # Admin path - no kin-bridge.js injection, bypasses OIDC auto-login
    location /nc-admin/ {
        rewrite ^/nc-admin(/.*)$ $1 break;
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;
    }

    # OnlyOffice Document Server
    location ^~ /ds/ {
        proxy_pass http://onlyoffice:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<script>document.addEventListener("keydown",function(e){try{window.parent.postMessage({type:"kinEditorKeydown",key:e.key||"",ctrlKey:!!e.ctrlKey,metaKey:!!e.metaKey,shiftKey:!!e.shiftKey,altKey:!!e.altKey},"*")}catch(_e){}})</script></head>';
    }

    # OnlyOffice runtime requests
    location ~ ^/(cache|web-apps|sdkjs|fonts|dictionaries|assets|coauthoring|plugins)/ {
        proxy_pass http://onlyoffice:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<script>document.addEventListener("keydown",function(e){try{window.parent.postMessage({type:"kinEditorKeydown",key:e.key||"",ctrlKey:!!e.ctrlKey,metaKey:!!e.metaKey,shiftKey:!!e.shiftKey,altKey:!!e.altKey},"*")}catch(_e){}})</script></head>';
    }

    # Direct Kin <-> OnlyOffice connector. Uses a variable so nginx can still
    # start when the optional direct connector overlay is not running.
    location ^~ /direct/ {
        set $onlyoffice_direct_upstream onlyoffice-direct:8000;
        proxy_pass http://$onlyoffice_direct_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebDAV endpoint with CORS for Kin Workspace cross-origin requests
    location /remote.php/webdav {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, MOVE, COPY, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Destination, Overwrite' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass http://nextcloud:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, MOVE, COPY, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Destination, Overwrite' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Type, Content-Length, ETag' always;
    }

    location / {
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;

        proxy_set_header Accept-Encoding "";
        proxy_force_ranges on;

        sub_filter_once off;
        sub_filter_types text/html application/javascript;
        sub_filter '</head>' '<script src="/kin-bridge.js"></script></head>';
        sub_filter '<body' '<body';

        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL" always;

        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors *;" always;
    }
}