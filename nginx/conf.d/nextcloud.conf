server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    client_max_body_size 10G;

    # Serve kin-bridge.js directly
    location = /kin-bridge.js {
        alias /etc/nginx/kin-bridge.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;

        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<script src="/kin-bridge.js"></script></head>';

        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL" always;

        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors *;" always;
    }
}
