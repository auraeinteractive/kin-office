server {
    listen 443 ssl;
    listen 5002 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    client_max_body_size 10G;

    # Serve kin-bridge.js directly
    location = /kin-bridge.js {
        alias /etc/nginx/kin-bridge.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ^~ /ds/ {
        proxy_pass http://onlyoffice/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # ONLYOFFICE runtime requests absolute URLs such as /cache/files/...
    # Proxy common document server root paths to the same backend.
    location ~ ^/(cache|web-apps|sdkjs|fonts|dictionaries|assets|coauthoring|plugins)/ {
        proxy_pass http://onlyoffice;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # WebDAV endpoint with CORS for Kin Workspace cross-origin requests
    location /remote.php/webdav {
        # Handle CORS preflight (PROPFIND etc. trigger OPTIONS preflight)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, MOVE, COPY, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Destination, Overwrite' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass http://nextcloud:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Accept-Encoding "";
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;

        # CORS headers on actual responses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, MOVE, COPY, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth, Destination, Overwrite' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Type, Content-Length, ETag' always;
    }

    location / {
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        proxy_cookie_flags ~ secure samesite=none;

        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</head>' '<style>#header{display:none!important}.header{display:none!important}.header-guest{display:none!important}#content{margin-top:0!important;height:100%!important}</style><script src="/kin-bridge.js"></script></head>';

        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "ALLOWALL" always;

        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors *;" always;
    }
}

# OnlyOffice Document Server on port 5003
server {
    listen 5003 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    location / {
        proxy_pass http://onlyoffice/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 5003;
    }
}
