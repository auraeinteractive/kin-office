version: '3.8'

services:
  onlyoffice-direct:
    build:
      context: ./direct-connector
    container_name: onlyoffice_direct_connector
    restart: unless-stopped
    environment:
      - DIRECT_CONNECTOR_HOST=0.0.0.0
      - DIRECT_CONNECTOR_PORT=8000
      - DIRECT_DOCUMENT_BASE_URL=http://onlyoffice-direct:8000/direct
      - DOCUMENT_SERVER_PUBLIC_URL=/ds/
      - DOCUMENT_SERVER_INTERNAL_URL=http://onlyoffice/
    networks:
      nextcloud_network:
        aliases:
          - onlyoffice-direct

networks:
  nextcloud_network:
    driver: bridge
