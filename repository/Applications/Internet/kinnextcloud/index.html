<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nextcloud Integration</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h1 {
      color: #4a9eff;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .status {
      color: #888;
      font-size: 14px;
      margin: 20px 0;
    }
    .info {
      color: #666;
      font-size: 12px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nextcloud Integration</h1>
    <div id="status" class="status">Registering with Workspace...</div>
    <div class="info">
      <p>This app exposes Nextcloud storage as a Dormant drive.</p>
      <p>Use the Desktop to access <strong>Nextcloud:</strong> disk.</p>
    </div>
  </div>
  <script type="module" src="app.js?v=3"></script>
  <script>
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (data && data.kinDormantResponse && data.requestId && data.requestId.indexOf('register-') === 0) {
        var status = document.getElementById('status');
        if (status) {
          if (data.success) {
            status.innerHTML = '<span style="color:#4f4;">✓ Drive registered!</span><br/><span style="color:#888;">Nextcloud: should appear on your desktop.</span>';
          } else {
            status.innerHTML = '<span style="color:#f44;">✗ Registration failed: ' + (data.error || 'unknown') + '</span>';
          }
        }
      }
    });
  </script>
</body>
</html>
