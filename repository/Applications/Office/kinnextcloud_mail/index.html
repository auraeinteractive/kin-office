<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nextcloud Mail</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0f1220;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b0d16;
    }
    #loading {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(231,234,243,0.9);
      font-size: 12px;
      letter-spacing: 0.2px;
      user-select: none;
      z-index: 2;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Connecting to Nextcloud…</div>
  <iframe id="iframe" title="Nextcloud Mail" src="about:blank"></iframe>
  <script type="module" src="app.js?v=1"></script>
</body>
</html>
