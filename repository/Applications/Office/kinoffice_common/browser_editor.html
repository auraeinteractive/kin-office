<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kin Office</title>
    <style>
        html, body, #editor { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: transparent; }
        #editor.loading { opacity: 0.5; transition: opacity 160ms ease; }
        #kin-debug-status {
            position: fixed;
            left: 8px;
            bottom: 8px;
            z-index: 2147483647;
            padding: 3px 6px;
            border-radius: 4px;
            background: rgba(20, 20, 20, 0.78);
            color: #fff;
            font: 11px/1.3 sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="editor"></div>
    <div id="kin-debug-status">Kin Office build 20260603-cache10 loading</div>
    <script src="vendor/kin-office/empty_bin.js?kinOfficeBuild=20260603-cache10"></script>
    <script src="browser_editor_adapter.js?kinOfficeBuild=20260603-cache10"></script>
    <script>
    (function() {
        'use strict';
        var ORIGIN = window.location.origin;
        var editorEl = document.getElementById('editor');
        var statusEl = document.getElementById('kin-debug-status');
        var editor = null;

        function debugLog() {
            try {
                console.log.apply(console, ['[KinOfficeEditorShell]'].concat(Array.prototype.slice.call(arguments)));
            } catch (_error) {}
        }

        function setEditorLoading(loading) {
            if (editorEl) editorEl.classList.toggle('loading', !!loading);
        }

        function setStatus(text) {
            if (statusEl) statusEl.textContent = 'Kin Office build 20260603-cache10 ' + text;
            debugLog(text);
        }

        function post(message) {
            try {
                window.parent.postMessage(Object.assign({ type: 'kinOfficeEditorEvent' }, message || {}), ORIGIN);
            } catch (_error) {}
        }

        function bytesToBase64(bytes) {
            var binary = '';
            var chunk = 0x8000;
            for (var i = 0; i < bytes.length; i += chunk) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
            }
            return btoa(binary);
        }

        function base64ToBytes(base64) {
            if (!base64) return null;
            var binary = atob(String(base64 || ''));
            var out = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i += 1) out[i] = binary.charCodeAt(i);
            return out;
        }

        async function openDocument(data) {
            if (!window.KinOfficeBrowser) throw new Error('Kin Office editor bridge did not load.');
            setStatus('open:start ' + (data.fileType || 'docx'));
            debugLog('open:start', data.fileName || 'Document.docx', data.fileType || 'docx', 'isNew=' + !!data.isNew, 'base64=' + String(data.data_base64 || '').length);
            setEditorLoading(true);
            if (editor && typeof editor.destroy === 'function') {
                editor.destroy();
                editor = null;
            }
            editor = await window.KinOfficeBrowser.create({
                containerId: 'editor',
                fileName: data.fileName || 'Document.docx',
                fileType: data.fileType || 'docx',
                bytes: base64ToBytes(data.data_base64 || ''),
                isNew: !!data.isNew,
                lang: data.lang || 'en',
                onReady: function() {
                    setStatus('open:ready');
                    debugLog('open:ready');
                    setEditorLoading(false);
                    post({ event: 'ready' });
                },
                onDirty: function(changed) {
                    debugLog('dirty', !!changed);
                    post({ event: 'documentStateChange', changed: !!changed });
                },
                onSaveRequested: function() {
                    debugLog('save requested');
                    post({ event: 'saveRequested' });
                },
                onError: function(error) {
                    setStatus('error ' + (error && error.message ? error.message : String(error)));
                    debugLog('error', error && error.message ? error.message : String(error));
                    post({ event: 'error', error: error && error.message ? error.message : String(error) });
                }
            });
            debugLog('open:create returned');
            setStatus('open:create returned');
        }

        async function exportDocument(requestId) {
            if (!editor || typeof editor.exportDocument !== 'function') throw new Error('No document is open.');
            debugLog('export:start', requestId || '');
            var result = await editor.exportDocument();
            debugLog('export:done', result.fileName || '', result.fileType || '', result.bytes ? result.bytes.length : 0);
            post({
                event: 'exported',
                requestId: requestId || '',
                fileName: result.fileName || '',
                fileType: result.fileType || '',
                data_base64: bytesToBase64(result.bytes || new Uint8Array(0))
            });
        }

        window.addEventListener('message', function(event) {
            if (event.origin !== ORIGIN) return;
            var data = event.data || {};
            if (data.type !== 'kinOfficeEditorCommand') return;
            if (data.command === 'open') {
                debugLog('command:open', data.requestId || '');
                openDocument(data).catch(function(error) {
                    setEditorLoading(false);
                    debugLog('open:failed', error && error.message ? error.message : String(error));
                    post({ event: 'error', error: error && error.message ? error.message : String(error) });
                });
                return;
            }
            if (data.command === 'export') {
                debugLog('command:export', data.requestId || '');
                exportDocument(data.requestId).catch(function(error) {
                    debugLog('export:failed', error && error.message ? error.message : String(error));
                    post({
                        event: 'exportFailed',
                        requestId: data.requestId || '',
                        error: error && error.message ? error.message : String(error)
                    });
                });
                return;
            }
            if (data.command === 'saveResult' && editor && typeof editor.processSaveResult === 'function') {
                editor.processSaveResult(data.success !== false, data.message || '');
            }
        });

        document.addEventListener('keydown', function(event) {
            var key = event && event.key ? String(event.key).toLowerCase() : '';
            if ((event.ctrlKey || event.metaKey) && key === 's') {
                event.preventDefault();
                event.stopPropagation();
                post({ event: 'saveRequested' });
            }
        }, true);

        window.addEventListener('beforeunload', function() {
            if (editor && typeof editor.destroy === 'function') editor.destroy();
        });

        post({ event: 'shellReady' });
        setStatus('shellReady');
    }());
    </script>
</body>
</html>
