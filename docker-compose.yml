version: '3.8'

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      - NEXTCLOUD_TRUSTED_DOMAINS=*
      - SQLITE_DATABASE=nextcloud
    volumes:
      - nextcloud_data:/var/www/html/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - nextcloud_network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - "5003:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    networks:
      - nextcloud_network

  nginx:
    image: nginx:latest
    container_name: nginx_nextcloud_proxy
    restart: unless-stopped
    ports:
      - "5002:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/kin-bridge.js:/etc/nginx/kin-bridge.js:ro
    depends_on:
      - nextcloud
      - onlyoffice
    networks:
      nextcloud_network:
        aliases:
          - katana-arphicia

networks:
  nextcloud_network:
    driver: bridge

volumes:
  nextcloud_data: