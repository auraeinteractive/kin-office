version: '3.8'

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost:5002
    volumes:
      - ./nextcloud/data:/var/www/html/data
      - ./nextcloud/config:/var/www/html/config
    networks:
      - nextcloud_network

  nginx:
    image: nginx:latest
    container_name: nginx_nextcloud_proxy
    restart: unless-stopped
    ports:
      - "5002:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/kin-bridge.js:/etc/nginx/kin-bridge.js:ro
    depends_on:
      - nextcloud
    networks:
      - nextcloud_network

networks:
  nextcloud_network:
    driver: bridge
