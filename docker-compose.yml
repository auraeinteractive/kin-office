version: '3.8'

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
      - NEXTCLOUD_TRUSTED_DOMAINS=*
      - SQLITE_DATABASE=nextcloud
    volumes:
      - ./nextcloud/data:/var/www/html/data
      - ./nextcloud/config:/var/www/html/config
    networks:
      - nextcloud_network

  nextcloud_oidc_init:
    image: nextcloud:latest
    container_name: nextcloud_oidc_init
    restart: "no"
    depends_on:
      - nextcloud
    entrypoint: ["/bin/bash", "/oidc-init.sh"]
    environment:
      - KIN_OIDC_PROVIDER_ID=${KIN_OIDC_PROVIDER_ID:-kin}
      - KIN_OIDC_CLIENT_ID=${KIN_OIDC_CLIENT_ID:-kin-nextcloud}
      - KIN_OIDC_CLIENT_SECRET=${KIN_OIDC_CLIENT_SECRET:-kin-nextcloud-secret}
      - KIN_OIDC_DISCOVERY_URI=${KIN_OIDC_DISCOVERY_URI:-https://localhost:9219/.well-known/openid-configuration}
    volumes:
      - ./nextcloud/config:/var/www/html/config
      - ./nextcloud/data:/var/www/html/data
      - ./nextcloud/oidc-init.sh:/oidc-init.sh:ro
    networks:
      - nextcloud_network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    networks:
      - nextcloud_network

  nginx:
    image: nginx:latest
    container_name: nginx_nextcloud_proxy
    restart: unless-stopped
    ports:
      - "5002:443"
      - "5003:5003"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/kin-bridge.js:/etc/nginx/kin-bridge.js:ro
    depends_on:
      - nextcloud
    networks:
      nextcloud_network:
        aliases:
          - katana-arphicia

networks:
  nextcloud_network:
    driver: bridge
