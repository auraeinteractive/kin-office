version: '3.8'

services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - "5003:80"
    environment:
      - JWT_ENABLED=false
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
    networks:
      kin_office_network:
        aliases:
          - onlyofficedocs

  onlyoffice-direct:
    build:
      context: ./direct-connector
    container_name: onlyoffice_direct_connector
    restart: unless-stopped
    environment:
      - DIRECT_CONNECTOR_HOST=0.0.0.0
      - DIRECT_CONNECTOR_PORT=8000
      - DIRECT_DOCUMENT_BASE_URL=http://onlyoffice-direct:8000/direct
      - DOCUMENT_SERVER_PUBLIC_URL=${KIN_OFFICE_PREFIX:-/kin-office}/ds/
      - DOCUMENT_SERVER_INTERNAL_URL=http://onlyoffice/
      - DIRECT_AUTOSAVE_INTERVAL_SECONDS=20
      - DIRECT_AUTOSAVE_IDLE_GRACE_SECONDS=60
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - onlyoffice
    networks:
      kin_office_network:
        aliases:
          - onlyoffice-direct

networks:
  kin_office_network:
    driver: bridge
